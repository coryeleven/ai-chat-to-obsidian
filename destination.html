<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置保存目录 · ChatGPT to Obsidian</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="destination.css">
  </head>
  <body class="destination-page">
    <header class="setup-topbar">
      <div class="brand setup-brand">
        <img class="brand-mark" src="icons/mark.svg" alt="">
        <div>
          <h1>ChatGPT to Obsidian</h1>
        </div>
      </div>
    </header>

    <main class="setup-main">
      <span class="badge">本地目录</span>
      <h2 id="setup-title">选择 Obsidian 保存目录</h2>

      <section id="folder-status" class="folder-status" aria-live="polite">
        <div class="folder-status-icon" aria-hidden="true">
          <svg class="row-icon" viewBox="0 0 24 24">
            <path d="M3 7.5A2.5 2.5 0 0 1 5.5 5H10l2 2h6.5A2.5 2.5 0 0 1 21 9.5v7A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5z"></path>
          </svg>
        </div>
        <div class="folder-status-copy">
          <span class="eyebrow">当前目录</span>
          <strong id="setup-folder-name">尚未选择</strong>
        </div>
        <span id="setup-permission" class="status-pill">未授权</span>
      </section>

      <section id="save-result" class="save-result" role="status" aria-live="polite" hidden>
        <div class="save-result-icon" aria-hidden="true">
          <svg class="row-icon" viewBox="0 0 24 24">
            <path d="m5 12 4 4L19 6"></path>
          </svg>
        </div>
        <div class="save-result-copy">
          <span class="eyebrow">保存完成</span>
          <strong id="saved-filename"></strong>
        </div>
      </section>

      <div id="setup-error" class="warning-panel" role="alert" hidden></div>

      <div class="setup-actions">
        <button id="setup-primary-button" class="primary-button" type="button">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 7.5A2.5 2.5 0 0 1 5.5 5H10l2 2h6.5A2.5 2.5 0 0 1 21 9.5v7A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5z"></path>
            <path d="M12 11v4"></path>
            <path d="M10 13h4"></path>
          </svg>
          <span id="setup-primary-label">选择目录</span>
        </button>
        <button id="setup-change-button" class="quiet-button" type="button" hidden>
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 6v5h-5"></path>
            <path d="M4 18v-5h5"></path>
            <path d="M18.4 9a7 7 0 0 0-11.9-2.5L4 9"></path>
            <path d="M5.6 15a7 7 0 0 0 11.9 2.5L20 15"></path>
          </svg>
          <span>更换目录</span>
        </button>
        <button id="setup-close-button" class="quiet-button" type="button">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19 12H5"></path>
            <path d="m12 19-7-7 7-7"></path>
          </svg>
          <span id="setup-close-label">返回对话</span>
        </button>
      </div>
    </main>

    <script type="module" src="destination.js"></script>
  </body>
</html>
