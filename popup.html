<!doctype html>
<!--
  The popup is a compact repeated-use tool: page context scrolls independently while the
  primary Obsidian action stays visible. Existing element IDs remain stable for runtime code.
-->
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat to Obsidian</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="popup-page">
    <main id="app-shell" class="app-shell" aria-busy="false">
      <header class="topbar">
        <div class="brand">
          <img class="brand-mark" src="icons/mark.svg" alt="">
          <h1>AI Chat to Obsidian</h1>
        </div>
        <div class="topbar-actions">
          <button id="settings-button" class="icon-button" type="button" aria-label="打开设置" title="打开设置">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.09a2 2 0 0 1 1 1.74v.5a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
          <button id="refresh-button" class="icon-button" type="button" aria-label="重新读取" title="重新读取">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 6v5h-5"></path>
              <path d="M4 18v-5h5"></path>
              <path d="M18.4 9a7 7 0 0 0-11.9-2.5L4 9"></path>
              <path d="M5.6 15a7 7 0 0 0 11.9 2.5L20 15"></path>
            </svg>
          </button>
        </div>
      </header>

      <section id="loading-view" class="state-view" aria-live="polite">
        <svg class="state-icon spinner" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="9"></circle>
          <path d="M12 3a9 9 0 0 1 9 9"></path>
        </svg>
        <p>正在读取当前对话...</p>
      </section>

      <section id="error-view" class="state-view" role="alert" hidden>
        <div class="state-symbol" aria-hidden="true">
          <svg class="state-icon" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9"></circle>
            <path d="M12 7.5v5"></path>
            <path d="M12 16.5h.01"></path>
          </svg>
        </div>
        <h2>无法读取当前页面</h2>
        <p id="error-message"></p>
        <button id="retry-button" class="primary-button" type="button">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 6v5h-5"></path>
            <path d="M4 18v-5h5"></path>
            <path d="M18.4 9a7 7 0 0 0-11.9-2.5L4 9"></path>
            <path d="M5.6 15a7 7 0 0 0 11.9 2.5L20 15"></path>
          </svg>
          <span>重试</span>
        </button>
      </section>

      <section id="conversation-view" class="conversation-view" hidden>
        <div class="conversation-scroll">
          <header class="conversation-heading">
            <h2 id="conversation-title"></h2>
            <div class="conversation-subline">
              <p id="conversation-meta" class="muted"></p>
              <span class="meta-separator" aria-hidden="true">·</span>
              <span id="extraction-badge" class="badge">页面已解析</span>
            </div>
          </header>

          <div id="warning-panel" class="warning-panel" role="alert" hidden>
            <strong>导出提示</strong>
            <p id="warning-message"></p>
          </div>

          <section class="transfer-group" aria-label="导出详情">
            <button id="edit-destination-button" class="destination-section" type="button" aria-label="编辑保存位置" title="编辑保存位置">
              <svg class="row-icon destination-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 7.5A2.5 2.5 0 0 1 5.5 5H10l2 2h6.5A2.5 2.5 0 0 1 21 9.5v7A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5z"></path>
              </svg>
              <span class="destination-copy">
                <span class="eyebrow">保存到</span>
                <strong id="destination-name">当前仓库 / AI Chats</strong>
              </span>
              <svg class="chevron-icon destination-chevron" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m9 18 6-6-6-6"></path>
              </svg>
            </button>

            <details id="preview-section" class="preview-section">
              <summary>
                <span class="preview-summary-copy">
                  <strong>Markdown 预览</strong>
                  <small id="markdown-stats">正在校验正文</small>
                </span>
                <span class="preview-summary-trailing">
                  <span class="preview-actions" aria-label="Markdown 操作">
                    <button id="copy-button" class="ghost-button" type="button" aria-label="复制 Markdown" title="复制 Markdown">
                      <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <rect x="8" y="8" width="12" height="12" rx="2"></rect>
                        <path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"></path>
                      </svg>
                    </button>
                    <button id="download-button" class="ghost-button" type="button" aria-label="下载 Markdown" title="下载 Markdown">
                      <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 3v12"></path>
                        <path d="m7.5 10.5 4.5 4.5 4.5-4.5"></path>
                        <path d="M5 20h14"></path>
                      </svg>
                    </button>
                  </span>
                  <svg class="chevron-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m8 10 4 4 4-4"></path>
                  </svg>
                </span>
              </summary>
              <div class="preview-content">
                <div class="preview-file-row">
                  <span>文件</span>
                  <code id="filename-label"></code>
                </div>
                <textarea id="markdown-preview" readonly spellcheck="false" aria-label="Markdown 预览"></textarea>
              </div>
            </details>
          </section>
        </div>

        <footer class="action-dock">
          <p id="save-status-message" class="save-status-message" role="status" aria-live="polite"></p>
          <button id="save-button" class="primary-button save-button" type="button">
            <span class="save-button-content">
              <svg id="save-button-icon" class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7 17 17 7"></path>
                <path d="M7 7h10v10"></path>
              </svg>
              <span id="save-button-label">保存到 Obsidian</span>
            </span>
            <kbd id="save-shortcut" class="save-shortcut">⌘ ↵</kbd>
          </button>
        </footer>
      </section>

      <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
    </main>

    <dialog id="settings-dialog" class="settings-dialog" aria-labelledby="settings-dialog-title">
      <form id="settings-form" class="settings-form">
        <header class="dialog-header">
          <div>
            <span class="eyebrow">Obsidian</span>
            <h2 id="settings-dialog-title">保存设置</h2>
          </div>
          <button id="close-settings-button" class="icon-button" type="button" aria-label="关闭设置" title="关闭">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </header>

        <label class="field-row" for="vault-input">
          <span>仓库名称</span>
          <input id="vault-input" name="vault" type="text" maxlength="120" placeholder="当前仓库（可留空）" autocomplete="off">
        </label>

        <label class="field-row" for="folder-input">
          <span>文件夹</span>
          <input id="folder-input" name="folder" type="text" maxlength="240" placeholder="AI Chats" autocomplete="off">
        </label>

        <label class="toggle-row" for="silent-open-input">
          <span>
            <strong>后台保存</strong>
            <small>不在 Obsidian 中打开新笔记</small>
          </span>
          <input id="silent-open-input" name="silentOpen" type="checkbox" role="switch">
        </label>

        <label class="toggle-row" for="detailed-metadata-input">
          <span>
            <strong>详细属性</strong>
            <small>包含时间、消息数和导出方式</small>
          </span>
          <input id="detailed-metadata-input" name="detailedMetadata" type="checkbox" role="switch">
        </label>

        <p id="settings-error-message" class="settings-error-message" role="alert" aria-live="assertive"></p>

        <footer class="dialog-actions">
          <button id="cancel-settings-button" class="quiet-button" type="button">取消</button>
          <button class="primary-button" type="submit">应用</button>
        </footer>
      </form>
    </dialog>

    <script type="module" src="popup.js"></script>
  </body>
</html>
